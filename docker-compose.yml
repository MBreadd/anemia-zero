services:
  app:
    build: .
    container_name: hemopuno_app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      APP_BASE_URL: http://localhost:3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: hemopuno
      DB_PASSWORD: hemopuno
      DB_NAME: hemopuno
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-hackathon-secret}
      TELEGRAM_ALLOW_SIMULATION: ${TELEGRAM_ALLOW_SIMULATION:-true}
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: hemopuno_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hemopuno
      POSTGRES_USER: hemopuno
      POSTGRES_PASSWORD: hemopuno
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
